services:
  frontend:
    build:
      context: ./frontend
      target: prod
    container_name: diagram_frontend_prod
    ports:
      - "5273:5273"
    depends_on:
      - backend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    networks:
      - obs-network
  backend:
    build:
      context: ./backend
      target: prod
    container_name: diagram_backend_prod
    ports:
      - "3100:3100"
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    networks:
      - obs-network
