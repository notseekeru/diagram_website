global:
  resolve_timeout: 5m

route:
  group_by: ["alertname"]
  group_wait: 0s
  group_interval: 10s
  repeat_interval: 1h
  # Fall back to Slack if an alert doesn't match the explicit sub-routes below
  receiver: "slack-notifications"

  routes:
    # 1. Catch DatabaseDown explicitly and route it to your Python script
    - match:
        alertname: DatabaseDown
      receiver: "chaos-webhook"
      continue: true

    # 2. Also ensure DatabaseDown triggers a Slack notification parallelly
    - match:
        alertname: DatabaseDown
      receiver: "slack-notifications"

receivers:
  - name: "chaos-webhook"
    webhook_configs:
      - url: "http://host.docker.internal:9099/"
        send_resolved: false

  - name: "slack-notifications"
    slack_configs:
      - api_url_file: "/tmp/slack_webhook.txt"
        channel: "#alertmanager"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] LGTM Stack Infrastructure Alert"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"
