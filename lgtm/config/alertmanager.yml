global:
  resolve_timeout: 5m

route:
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 50s
  repeat_interval: 1h
  receiver: "slack-notifications"

receivers:
  - name: "slack-notifications"
    slack_configs:
      - api_url_file: "/tmp/slack_webhook.txt"
        channel: "#alertmanager"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] LGTM Stack Infrastructure Alert"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"
