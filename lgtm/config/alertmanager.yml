global:
  resolve_timeout: 5m

route:
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 50s
  repeat_interval: 1h
  receiver: "slack-notifications"

receivers:
  - name: "local-loopback"
    webhook_configs:
      - url: "http://127.0.0.1"
  - name: "slack-notifications"
    slack_configs:
      - api_url: "${ALERTMANAGER_SLACK_WEBHOOK}"
        channel: "#alertmanager"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] LGTM Stack Infrastructure Alert"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"
