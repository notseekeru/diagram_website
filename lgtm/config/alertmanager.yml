global:
  resolve_timeout: 5m

route:
  group_by: ["alertname"]
  group_wait: 0s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "slack-notifications"

  routes:
    - match:
        alertname: DatabaseDown
      receiver: "chaos-webhook"
      continue: true

receivers:
  - name: "slack-notifications"
    slack_configs:
      - api_url_file: "/tmp/slack_webhook.txt"
        channel: "#alertmanager"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] LGTM Stack Infrastructure Alert"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"

  - name: "chaos-webhook"
    webhook_configs:
      - url: "http://host.docker.internal:9099/" # Use host.docker.internal to reach the host machine from within Docker
        send_resolved: false
