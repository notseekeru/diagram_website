# curl -s 'http://localhost:9090/api/v1/label/__name__/values'

global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: "alloy"
    static_configs:
      - targets: ["alloy:12345"]

rule_files:
  - "/etc/prometheus/alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"
