global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "alloy"
    static_configs:
      - targets: ["alloy:12345"]

rule_files:
  - "/etc/prometheus/alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"
