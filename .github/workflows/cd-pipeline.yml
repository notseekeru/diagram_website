name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image_suffix: diagram_frontend
            port: 8080
            health_endpoint: /
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image_suffix: diagram_backend
            port: 5050
            health_endpoint: /healthz
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image name
        run: echo "IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service.image_suffix }}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build for smoke test (single‑arch, load into daemon)
      - name: Build local image
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          load: true
          push: false
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ matrix.service.context }}/.trivyignore:/.trivyignore \
            aquasec/trivy:0.41.0 image \
            --severity HIGH,CRITICAL --exit-code 1 \
            --ignorefile /.trivyignore \
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Run smoke container
        run: |
          cat > /tmp/smoke-env-${{ matrix.service.name }}.env << EOF
          API_KEY=ci_smoke_key
          DATABASE_URL=postgres://p:p@localhost:5432/d
          EOF
          docker run -d --name smoke-${{ matrix.service.name }}-${{ github.run_id }} \
            -p 127.0.0.1:${{ matrix.service.port }}:${{ matrix.service.port }} \
            --env-file /tmp/smoke-env-${{ matrix.service.name }}.env \
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Wait for service
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:${{ matrix.service.port }}${{ matrix.service.health_endpoint }} >/dev/null; then
              echo "${{ matrix.service.name }} is up"; exit 0
            fi
            sleep 1
          done
          echo "${{ matrix.service.name }} did not respond"
          docker logs smoke-${{ matrix.service.name }}-${{ github.run_id }} || true
          exit 1

      - name: Smoke test
        run: curl -fsS http://127.0.0.1:${{ matrix.service.port }}${{ matrix.service.health_endpoint }} >/dev/null

      - name: Push multi‑arch image
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cleanup
        if: always()
        run: |
          docker rm -f smoke-${{ matrix.service.name }}-${{ github.run_id }} || true
          docker rmi ${{ env.IMAGE }}:${{ github.sha }} || true
