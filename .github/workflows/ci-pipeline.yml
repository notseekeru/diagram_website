name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, backend]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Audit (informational)
        run: npm audit --audit-level=moderate || true

      - name: Scan with Trivy (filesystem)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/${{ matrix.service }}:/workspace \
            -v ${{ github.workspace }}/${{ matrix.service }}/.trivyignore:/.trivyignore \
            aquasec/trivy:0.41.0 filesystem \
            --severity HIGH,CRITICAL --exit-code 1 \
            --ignorefile /.trivyignore \
            /workspace
