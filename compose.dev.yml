services:
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: diagram_frontend_dev
    ports:
      - "5273:5273"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped
  backend:
    build:
      context: ./backend
      target: dev
    container_name: diagram_backend_dev
    ports:
      - "3100:3100"
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
