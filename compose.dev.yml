services:
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: diagram_frontend_dev
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
  backend:
    build:
      context: ./backend
      target: dev
    container_name: diagram_backend_dev
    ports:
      - "5000:5000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped
